<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cosyhotels — Architecture Map</title>
<style>
  :root{
    --bg:#0F0F0F; --panel:#161616; --panel-2:#1c1c1c; --border:#2a2a2a;
    --text:#e8e8e8; --muted:#8a8a8a;
    --client:#4ea1ff; --route:#7bd389; --service:#c792ea; --db:#ffb86b;
    --external:#ff6b9d; --critical:#ff3860; --accent:#f5b942; --accent-2:#ff7a45;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  #top{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;gap:8px;
    padding:0 14px;background:linear-gradient(#161616,#121212);border-bottom:1px solid var(--border);z-index:10}
  #top h1{font-size:14px;font-weight:600;margin:0 14px 0 0;letter-spacing:.3px;white-space:nowrap}
  #top h1 b{color:var(--accent)}
  .chips{display:flex;gap:6px;flex-wrap:wrap;overflow:hidden}
  .chip{font-size:12px;padding:5px 11px;border-radius:999px;border:1px solid var(--border);
    background:var(--panel-2);color:var(--muted);cursor:pointer;white-space:nowrap;transition:.12s}
  .chip:hover{color:var(--text);border-color:#3a3a3a}
  .chip.on{background:var(--accent);color:#1a1a1a;border-color:var(--accent);font-weight:600}
  .chip.crit.on{background:var(--critical);color:#fff;border-color:var(--critical)}
  .chip.bugs.on{background:var(--external);color:#fff;border-color:var(--external)}
  #stage{position:absolute;top:52px;left:0;right:340px;bottom:0;overflow:hidden;cursor:grab}
  #stage.drag{cursor:grabbing}
  svg{width:100%;height:100%;display:block;user-select:none}
  .clbox{fill-opacity:.10;stroke-opacity:.5;rx:14}
  .cllabel{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;fill-opacity:.65}
  .node{cursor:pointer}
  .node rect{rx:9;transition:opacity .15s}
  .node .nl{font-size:12.5px;font-weight:600;fill:var(--text)}
  .node .ns{font-size:10.5px;fill:var(--muted)}
  .node.dim{opacity:.13}
  .edge{fill:none;stroke-width:1.4;opacity:.5;transition:opacity .15s}
  .edge.dim{opacity:.04}
  .edge.hot{opacity:.95;stroke-width:2.2}
  .elabel{font-size:10px;fill:#9a9a9a}
  .elabel.dim{opacity:.05}
  .badge-f{fill:var(--route)} .badge-b{fill:var(--critical)}
  .badge-t{font-size:9px;font-weight:700;fill:#0c0c0c}
  #side{position:fixed;top:52px;right:0;bottom:0;width:340px;background:var(--panel);
    border-left:1px solid var(--border);padding:16px 16px 40px;overflow-y:auto}
  #side h2{font-size:15px;margin:0 0 2px}
  #side .path{font-size:11px;color:var(--accent);font-family:ui-monospace,Menlo,monospace;word-break:break-all;margin:4px 0 10px}
  #side .role{font-size:13px;line-height:1.5;margin:0 0 8px}
  #side .plain{font-size:12.5px;line-height:1.55;color:#cfcfcf;background:var(--panel-2);
    border-left:2px solid var(--accent);padding:8px 10px;border-radius:0 6px 6px 0;margin:0 0 10px}
  #side h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:14px 0 6px}
  #side ul{margin:0;padding-left:16px} #side li{font-size:12px;line-height:1.55;margin-bottom:4px;color:#d2d2d2}
  .fix{color:var(--route)} .bug{color:#ff7088}
  .bug .sev{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-right:5px;background:#3a1520;color:#ff8a9e}
  .bug .sev.high{background:#4a1020;color:#ff5d78}
  .ekind{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle}
  #ctrls{position:fixed;left:14px;bottom:14px;display:flex;gap:6px;z-index:10}
  #ctrls button{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
    background:var(--panel-2);color:var(--text);font-size:16px;cursor:pointer}
  #ctrls button:hover{border-color:#3a3a3a}
  .legend{position:fixed;left:60px;bottom:16px;display:flex;gap:12px;font-size:11px;color:var(--muted);align-items:center}
  .legend span{display:flex;align-items:center;gap:4px}
  .lg{width:18px;height:3px;border-radius:2px;display:inline-block}
</style>
</head>
<body>
<div id="top">
  <h1>Cosy<b>hotels</b> · architecture</h1>
  <div class="chips" id="chips"></div>
</div>
<div id="stage">
  <svg id="svg" viewBox="0 0 2200 1560" preserveAspectRatio="xMidYMid meet">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10 z" fill="#6a6a6a"/></marker>
      <marker id="arrowc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10 z" fill="#ff3860"/></marker>
    </defs>
    <g id="world"></g>
  </svg>
</div>
<div id="side"></div>
<div id="ctrls"><button id="fit" title="Fit">⊡</button><button id="zin">+</button><button id="zout">−</button></div>
<div class="legend">
  <span><i class="lg" style="background:#ff3860"></i>critical</span>
  <span><i class="lg" style="background:#ff7a45"></i>API</span>
  <span><i class="lg" style="background:#ffb86b"></i>DB</span>
  <span><i class="lg" style="background:#4ea1ff"></i>mount</span>
  <span><i class="lg" style="background:#6a6a6a"></i>normal</span>
</div>

const col={client:40,pages:382,api:724,service:1096,data:1448,external:1770};

const nodes=[
  // CLIENT
  N('theme','client','ThemeToggle.tsx','round ☀/☾ toggle',col.client,110,250,NH,'client',{role:'Light/dark theme toggle, sets data-theme on <html>.',plain:'The little sun/moon button that switches the whole site between dark and light.',path:'src/components/ThemeToggle.tsx',notes:['Persists choice in localStorage','No-flash init script lives in root layout'],tag:['overview','theme','all']}),
  N('share','client','ShareButton.tsx','native sheet + popover',col.client,196,250,NH,'client',{role:'Subtle round share icon: Web Share API on mobile, copy-link popover on desktop.',plain:'The share button on hotel and city pages. On a phone it opens the normal share menu; on a computer a small Copy-link menu.',path:'src/components/ShareButton.tsx',notes:['Redesigned to icon-only (share clicks <1% of views)','Platforms: Copy link, Pinterest, WhatsApp, X'],tag:['overview','share','all']}),
  N('badge','client','BadgeEmbed.tsx','"Rated Cosy" embed',col.client,282,250,NH,'client',{role:'Copy-paste embed snippet for hotels to backlink to their ranking.',plain:'On each hotel page, a code a hotel can paste on their own website to show their cosy score — and it links back to us (free backlinks).',path:'src/components/BadgeEmbed.tsx',notes:['Pulls /api/badge SVG','Link carries utm_source=badge'],tag:['backlinks','all']}),
  N('analytics','client','Analytics.tsx','pageview + CTA log',col.client,368,250,NH,'client',{role:'Logs pageviews + CTA clicks to GA, Vercel, and first-party /api/track.',plain:'Invisible tracker. Records each page view and each "Check availability" click so the growth dashboard can show where visitors come from.',path:'src/components/Analytics.tsx',notes:['sendBeacon → /api/track','Session source attribution (utm survives navigation)','Lives in [locale] layout (homepage uses root layout — coverage gap)'],tag:['overview','growth','all'],critical:true}),
  N('hsearch','client','HeaderSearch.tsx','city search',col.client,454,250,NH,'client',{role:'Header city autocomplete; routes to /guides/{city}.',plain:'The search box in the header — type a city, land on its cosy-hotels page.',path:'src/components/HeaderSearch.tsx',notes:['Autocomplete from local cities (Amadeus killed)'],tag:['overview','all']}),
  N('grader','client','grade/Grader.tsx','keyboard grader',col.client,540,250,NH,'client',{role:'Owner-only Tinder-style grader; writes human cosy/link labels.',plain:'Your private tool to rate hotels by keyboard — is the score right, is the link right — building ground truth.',path:'src/app/grade/Grader.tsx',notes:['Durable saves: keepalive + retry + re-queue (was losing ~30%)','Posts to /api/grade'],tag:['scoring','grading','all']}),

  N('guide','pages','guides/[slug]/page.tsx','city ranking','',col.pages,210,NW,NH,'route',{role:'The canonical city page: AI-ranked cosy hotels for a city.',plain:'The main product page — "Cosy & boutique hotels in {city}", ranked best first, with photos and scores. Where social/SEO traffic lands.',path:'src/app/[locale]/guides/[slug]/page.tsx',notes:['Targets "boutique hotels {city}" (higher volume)','Skips vision_ok=false junk photos','Links facet roundups + excludes bad links'],tag:['overview','scoring','seo','all'],critical:true}),
  N('hotel','pages','hotels/[slug]/page.tsx','hotel detail',col.pages,310,NW,NH,'route',{role:'Single hotel: photo, cosy score, description, Stay22 CTA, share, badge.',plain:'One hotel’s page — its photo, score, a sentence about it, the booking button, share + the embeddable badge.',path:'src/app/[locale]/hotels/[slug]/page.tsx',notes:['Skips vision_ok=false + junk-URL images (logos/wifi)','301-redirects merged-away slugs'],tag:['overview','scoring','all'],critical:true}),

  N('posts','pages','posts/page.tsx','social preview',col.pages,810,NW,NH,'route',{role:'Previews exactly what publishes per city to social.',plain:'A preview of the social posts before they go out.',path:'src/app/posts/page.tsx',notes:['Mirrors cityPin output'],tag:['social','all']}),
  N('today','pages','today/page.tsx','manual Pinterest queue',col.pages,910,NW,NH,'route',{role:'One-click manual Pinterest posting queue (warm-up).',plain:'A queue of ready-to-pin hotels for posting Pinterest by hand while the account warms up.',path:'src/app/today/page.tsx',notes:['Pinterest warm-up workaround'],tag:['social','all']}),
  N('rate','pages','rate/page.tsx','friend vote','',col.pages,1010,NW,NH,'route',{role:'Tinder-style friend cosiness vote (multi-rater baseline).',plain:'A swipe game for friends to vote cosy/not — a second opinion beyond your own grading.',path:'src/app/rate/page.tsx',notes:['Writes cosy_votes','AI score hidden for independence'],tag:['grading','all']}),

  // API / CRONS
  N('rescore','api','cron/recompute-scores','SCORING cron',col.api,110,290,NH,'route',{role:'Re-scores hotels with Claude + calibration anchors; writes cosy_scores.',plain:'The job that asks the AI to score hotels. Costs money — currently the bottleneck for fixing accuracy.',path:'src/app/api/cron/recompute-scores/route.ts',notes:['Calls claudeCosyScore with calibration','OFF-BUDGET right now'],tag:['scoring','all'],critical:true}),
  N('renorm','api','cron/recompute-normalized','percentile curve',col.api,196,290,NH,'route',{role:'Maps raw_score percentiles onto the 0–10 display curve.',plain:'Grades the scores on a curve so they spread across 0–10. The "pins" decide how generous the numbers look.',path:'src/app/api/cron/recompute-normalized/route.ts',notes:['Pins retuned to honest 5.0/6.5/8.5','Null-raw guard (won’t zero un-scored rows)','raw>p99 still extrapolates → the bogus 10s'],tag:['scoring','all'],critical:true}),
  N('spublish','api','cron/social-publish','carousel publisher',col.api,282,290,NH,'route',{role:'Builds a city carousel → Blotato → Pinterest/Instagram.',plain:'The job that posts a city’s cosiest hotels to social media.',path:'src/app/api/cron/social-publish/route.ts',notes:['webp→jpeg badges, brightness guard, min-3 slides','Smart city rotation (skips villages)'],tag:['social','all']}),
  N('igdaily','api','cron/instagram-daily','daily IG trigger',col.api,368,290,NH,'route',{role:'13:00 UTC cron → social-publish?auto=1&only=instagram.',plain:'The daily alarm that triggers an Instagram post.',path:'src/app/api/cron/instagram-daily/route.ts',notes:['Verified posting works (Blotato)','Was skipping on black/under-3 slides'],tag:['social','all']}),
  N('shandles','api','cron/social-handles','@mention resolver',col.api,454,290,NH,'route',{role:'Resolves featured hotels’ IG/social handles for @mentions.',plain:'Finds each hotel’s Instagram handle so posts can tag them (drives reposts).',path:'src/app/api/cron/social-handles/route.ts',notes:[],tag:['social','all']}),
  N('ensure','api','cron/ensure-featured','front-page set',col.api,540,290,NH,'route',{role:'Maintains the 9 front-page featured hotels (≥7).',plain:'Keeps the homepage’s top hotels fresh.',path:'src/app/api/cron/ensure-featured/route.ts',notes:['Excludes link_ok=false'],tag:['all']}),
  N('populate','api','cron/populate · grow','ingest + SEO',col.api,626,290,NH,'route',{role:'Populate hotels per city + weekly growth/indexing run.',plain:'Brings in new hotels and pings Google/Bing about new pages.',path:'src/app/api/cron/populate/route.ts',notes:['grow writes growth_log + GSC pull'],tag:['growth','seo','all']}),
  N('reresolve','api','admin/reresolve-junk','free photo re-fetch',col.api,712,290,NH,'route',{role:'Re-fetches a real free photo for junk-imaged hotels (website og → Wikimedia).',plain:'When a hotel’s photo is a logo/voucher, this finds a real one from their website — free.',path:'src/app/api/admin/reresolve-junk/route.ts',notes:['Recovered 1,639 photos (~72%)','Excludes the junk URL'],tag:['images','all']}),
  N('visionqa','api','cron/vision-qa','Haiku image QA',col.api,798,290,NH,'route',{role:'Haiku classifies stored photos; flags junk via vision_ok.',plain:'An AI pass that looks at each photo and marks the junk ones (paid — Haiku).',path:'src/app/api/cron/vision-qa/route.ts',notes:['Full backfill ~$30, not run','vision_ok=false = confirmed junk'],tag:['images','all']}),
  N('track','api','api/track','event sink',col.api,884,290,NH,'route',{role:'Receives pageview/CTA events → events table.',plain:'The mailbox that receives the tracker’s pings and stores them.',path:'src/app/api/track/route.ts',notes:['Fire-and-forget; never errors the page'],tag:['growth','all'],critical:true}),
  N('badgeapi','api','api/badge','SVG badge',col.api,970,290,NH,'route',{role:'Renders the embeddable "Rated Cosy x.x" SVG badge.',plain:'Draws the little badge image hotels embed on their sites.',path:'src/app/api/badge/route.tsx',notes:['SVG, cached 1 day'],tag:['backlinks','all']}),
  N('hotelpin','api','social/hotel-pin','badge image (satori)',col.api,1056,290,NH,'route',{role:'Renders a hotel’s photo+score card for social (next/og).',plain:'Makes the picture posted to Instagram/Pinterest — the photo with the cosy score on it.',path:'src/app/api/social/hotel-pin/route.tsx',notes:['Transcodes webp→jpeg (satori can’t decode webp)','Score moved to y296 (below IG grid-crop)'],tag:['social','images','all']}),
  N('gradeapi','api','api/grade','grade sink',col.api,1142,290,NH,'route',{role:'Upserts a human grade into hotel_grades.',plain:'Saves each rating you make in the grader.',path:'src/app/api/grade/route.ts',notes:['Upsert by hotel_id'],tag:['scoring','grading','all']}),
  N('vote','api','api/vote','vote sink',col.api,1228,290,NH,'route',{role:'Records a friend cosy/not vote into cosy_votes.',plain:'Saves friends’ swipe votes.',path:'src/app/api/vote/route.ts',notes:[],tag:['grading','all']}),
  N('go','api','go/[id]','redirect tracker',col.api,1314,290,NH,'route',{role:'Outbound click redirect.',plain:'A link shortener/tracker for outbound clicks.',path:'src/app/go/[id]/route.ts',notes:[],tag:['all']}),

  // SERVICES
  N('claude','service','scoring/claudeCosy.ts','PROMPT ASSEMBLY',col.service,110,NW,NH,'service',{role:'Builds the multimodal scoring message (rubric+data+images+calibration) and calls Claude.',plain:'The heart of scoring: it gathers the rubric, the hotel’s data, its photos, and your past corrections, asks Claude, and reads back a 0–100 score. THE seam.',path:'src/lib/scoring/claudeCosy.ts',notes:['model claude-sonnet-4-6, temp 0, effort low','Retries text-only if an image fails','BLIND (no image) → over-scores from name/keywords'],tag:['overview','scoring','all'],critical:true}),
  N('prompt','service','SCORING_PROMPT.md','rubric',col.service,196,NW,NH,'service',{role:'The cosiness rubric: bands, anti-inflation rules, worked examples.',plain:'The written instructions telling the AI what "cosy" means and how to score it.',path:'SCORING_PROMPT.md',notes:['Sparse-data → middle band (a generosity source)','Vision treated as "strong positive" (marketing photos inflate)'],tag:['scoring','all'],critical:true}),
  N('cosy','service','scoring/cosy.ts','score100→10 + types',col.service,282,NW,NH,'service',{role:'Score scaling helper + shared HotelFeatures types.',plain:'Converts the 0–100 score to 0–10 and defines the shared data shapes.',path:'src/lib/scoring/cosy.ts',notes:['score100to10 is linear (/10)'],tag:['scoring','all'],critical:true}),

  N('social','service','social.ts','cityPin builder',col.service,540,NW,NH,'service',{role:'Builds the shared pin payload (slides, mentions) for /posts + publish.',plain:'Assembles which hotels and photos go into a city’s social post.',path:'src/lib/social.ts',notes:['Requires vision_ok=true photos (strict → sparse)','Excludes bad-link hotels'],tag:['social','all']}),
  N('aff','service','affiliates.ts','Stay22 deep link',col.service,626,NW,NH,'service',{role:'Builds the Stay22 allez/roam "Check availability" link (the revenue link).',plain:'Makes the booking button’s link. Stay22 turns it into a commissionable booking link.',path:'src/lib/affiliates.ts',notes:['allez/roam is fuzzy name+coords (can land on city search)','No Stay22 reporting API → revenue not in-app'],tag:['overview','revenue','all'],critical:true}),
  N('linkq','service','linkQuality.ts','bad-link gate',col.service,712,NW,NH,'service',{role:'Returns hotel_ids a human flagged as mislinked (link_ok=false).',plain:'A list of hotels with known-wrong links, so we never feature them.',path:'src/lib/linkQuality.ts',notes:['Used by home, guide, social, ensure-featured'],tag:['revenue','all']}),
  N('imgfree','service','hotelImageFree.ts','free image resolver',col.service,798,NW,NH,'service',{role:'Website og:image → Wikidata → name-matched Wikimedia geo → placeholder.',plain:'Finds a real, free, reusable hotel photo without paying any image API.',path:'src/lib/hotelImageFree.ts',notes:['No Google Places (ToS forbids caching)','JUNK_IMG regex filters logos/icons'],tag:['images','all']}),
  N('cslug','service','citySlug.ts','city↔slug',col.service,884,NW,NH,'service',{role:'City→slug with diacritic transliteration; slug→known city.',plain:'Turns "Malmö" into a URL and back, handling accents.',path:'src/lib/citySlug.ts',notes:['KNOWN list = data/cities + cities_large','Local→English still partial (Venezia vs Venice)'],tag:['seo','all']}),
  N('facets','service','facets.ts','facet matcher',col.service,970,NW,NH,'service',{role:'Regex facet matching on real signals/description.',plain:'Decides if a hotel truly has a fireplace/spa/view from its data.',path:'src/lib/facets.ts',notes:['5 facets; pages need ≥2 matches'],tag:['seo','all']}),
  N('dq','service','dataQuality.ts','linking trust','',col.service,1056,NW,NH,'service',{role:'Deterministic geo/rating-trust + validateHotel checks.',plain:'Cheap sanity checks — is the location plausible, is the rating real.',path:'src/lib/dataQuality.ts',notes:['geoConsistent, ratingHasRealData'],tag:['all']}),

// ---------- selection ----------
let locked=null, activeTag='overview';
function neighbors(id){const s=new Set([id]);edges.forEach(e=>{if(e.from===id)s.add(e.to);if(e.to===id)s.add(e.from);});return s;}
function select(id,show){
  if(id){
    const keep=neighbors(id);
    nodes.forEach(n=>nodeEls[n.id].classList.toggle('dim',!keep.has(n.id)));
    edgeEls.forEach(o=>{const on=o.ed.from===id||o.ed.to===id;o.path.classList.toggle('hot',on);o.path.classList.toggle('dim',!on);o.lab.classList.toggle('dim',!on);});
    if(show)sidebar(byId[id]);
  }else{ applyFilter(activeTag); if(!locked) defaultSidebar(); }
}
function sidebar(n){
  const fx=FIXES[n.id]||[], bg=KNOWN_BUGS[n.id]||[];
  const ins=edges.filter(e=>e.to===n.id), outs=edges.filter(e=>e.from===n.id);
  const edRow=e=>{const o=e.from===n.id?'→ '+byId[e.to].label:'← '+byId[e.from].label;
    return `<li><span class="ekind" style="background:${EK[e.kind]}"></span>${o} <span style="color:#888">· ${e.label}</span></li>`;};
  document.getElementById('side').innerHTML=`
    <h2>${n.label}</h2><div class="path">${n.path||''}</div>
    <div class="role">${n.role||''}</div>
    <div class="plain">${n.plain||''}</div>
    ${n.notes&&n.notes.length?`<h3>Notes</h3><ul>${n.notes.map(x=>`<li>${x}</li>`).join('')}</ul>`:''}
    ${fx.length?`<h3>Fixes (${fx.length})</h3><ul>${fx.map(f=>`<li class="fix">✔ ${f.t}</li>`).join('')}</ul>`:''}
    ${bg.length?`<h3>Known issues (${bg.length})</h3><ul>${bg.map(b=>`<li class="bug"><span class="sev ${b.sev}">${b.sev}</span>${b.t}</li>`).join('')}</ul>`:''}
    ${outs.length?`<h3>Outgoing</h3><ul>${outs.map(edRow).join('')}</ul>`:''}
    ${ins.length?`<h3>Incoming</h3><ul>${ins.map(edRow).join('')}</ul>`:''}`;
}

// ---------- filters ----------
function applyFilter(tag){
  activeTag=tag;
  if(tag==='bugs'){
    nodes.forEach(n=>nodeEls[n.id].classList.toggle('dim',!(FIXES[n.id]||KNOWN_BUGS[n.id])));
    edgeEls.forEach(o=>{o.path.classList.add('dim');o.lab.classList.add('dim');o.path.classList.remove('hot');});
    return;
  }
  const all=tag==='allwires';
  nodes.forEach(n=>nodeEls[n.id].classList.toggle('dim',!(all||n.tag.includes(tag))));
  edgeEls.forEach(o=>{
    const on=all||(o.ed.tag.includes(tag));
    o.path.classList.toggle('dim',!on);o.lab.classList.toggle('dim',!on);
    o.path.classList.toggle('hot',on&&(tag==='critical'||o.ed.kind==='critical'&&tag==='overview'));
  });
}

  {id:'revenue',label:'Revenue'},{id:'growth',label:'Growth'},{id:'seo',label:'SEO'},
  {id:'grading',label:'Grading'},{id:'backlinks',label:'Backlinks'},{id:'theme',label:'Theme'},
  {id:'allwires',label:'Show all wires'},{id:'bugs',label:'Roadmap & bugs',cls:'bugs'},
];
const chips=document.getElementById('chips');
chipDefs.forEach((c,i)=>{
  const b=document.createElement('div');b.className='chip'+(c.cls?' '+c.cls:'')+(i===0?' on':'');
  b.textContent=c.label;b.onclick=()=>{[...chips.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');locked=null;applyFilter(c.id);defaultSidebar();};
  chips.appendChild(b);
});

// ---------- pan / zoom ----------
let tx=0,ty=0,s=1;
const stage=document.getElementById('stage');
function apply(){world.setAttribute('transform',`translate(${tx} ${ty}) scale(${s})`);}
function fit(){const vw=stage.clientWidth,vh=stage.clientHeight;s=Math.min(vw/2160,vh/1540)*0.96;tx=(vw-2200*s)/2;ty=20;apply();}
stage.addEventListener('wheel',e=>{e.preventDefault();const r=stage.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
  const ns=Math.max(.25,Math.min(2.4,s*(e.deltaY<0?1.1:0.9)));tx=mx-(mx-tx)*(ns/s);ty=my-(my-ty)*(ns/s);s=ns;apply();},{passive:false});
let pan=false,px,py;
stage.addEventListener('mousedown',e=>{if(e.target.closest('.node'))return;pan=true;px=e.clientX;py=e.clientY;stage.classList.add('drag');locked=null;select(null);});
window.addEventListener('mousemove',e=>{if(!pan)return;tx+=e.clientX-px;ty+=e.clientY-py;px=e.clientX;py=e.clientY;apply();});
window.addEventListener('mouseup',()=>{pan=false;stage.classList.remove('drag');});
document.getElementById('fit').onclick=fit;
document.getElementById('zin').onclick=()=>{s=Math.min(2.4,s*1.15);apply();};
document.getElementById('zout').onclick=()=>{s=Math.max(.25,s*0.87);apply();};

fit();applyFilter('overview');defaultSidebar();
</script>
</body>
</html>
