<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cosy seal of approval">
  <!-- Warm "Hygge" seal: a cosy little harbour seal that doubles as a mark of approval -->
  <circle cx="60" cy="60" r="57" fill="#fffdf9" stroke="#c2603a" stroke-width="3.5"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#c2603a" stroke-width="1" opacity="0.35" stroke-dasharray="2 4"/>
  <!-- soft body shadow -->
  <ellipse cx="60" cy="80" rx="32" ry="17" fill="#c2603a" opacity="0.10"/>
  <!-- seal face -->
  <ellipse cx="60" cy="62" rx="30" ry="27" fill="#8c6f5e" opacity="0.12"/>
  <!-- eyes -->
  <circle cx="48" cy="56" r="5.5" fill="#2b2420"/>
  <circle cx="72" cy="56" r="5.5" fill="#2b2420"/>
  <circle cx="49.6" cy="54.2" r="1.6" fill="#fffdf9"/>
  <circle cx="73.6" cy="54.2" r="1.6" fill="#fffdf9"/>
  <!-- nose -->
  <path d="M56 66 q4 4 8 0 q-4 3 -8 0z" fill="#c2603a"/>
  <!-- happy mouth -->
  <path d="M50 70 Q60 80 70 70" stroke="#2b2420" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <path d="M30 60 h13" stroke="#8c8178" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M30 65 h13" stroke="#8c8178" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M77 60 h13" stroke="#8c8178" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M77 65 h13" stroke="#8c8178" stroke-width="1.8" stroke-linecap="round"/>
  <!-- cosy sage wave at the base -->
  <path d="M16 98 C32 88 44 108 60 98 C76 88 88 108 104 98" stroke="#5c6b56" stroke-width="5" fill="none" stroke-linecap="round"/>
</svg>
